global:
  scrape_interval: 15s

scrape_configs:
  - job_name: multi-model-rag-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  - job_name: multi-model-rag-worker
    static_configs:
      - targets: ["worker:9100"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
