apiVersion: apps/v1
kind: Deployment
metadata:
  name: multi-model-rag-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/component: worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
    spec:
      containers:
        - name: worker
          image: ghcr.io/danishali778/multi-model-rag-worker:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - /app/infra/docker/worker-start.sh
          envFrom:
            - configMapRef:
                name: multi-model-rag-config
            - secretRef:
                name: multi-model-rag-secrets
          env:
            - name: RUNTIME_ROLE
              value: worker
            - name: TELEMETRY_SERVICE_NAME
              value: multi-model-rag-worker
            - name: WORKER_METRICS_PORT
              value: "9100"
          ports:
            - containerPort: 9100
              name: metrics
          readinessProbe:
            exec:
              command:
                - python
                - scripts/healthcheck_worker.py
            initialDelaySeconds: 15
            periodSeconds: 15
          livenessProbe:
            exec:
              command:
                - python
                - scripts/healthcheck_worker.py
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
