apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: multi-model-rag-api
spec:
  ingressClassName: nginx
  rules:
    - host: api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: multi-model-rag-api
                port:
                  number: 80
