apiVersion: apps/v1
kind: Deployment
metadata:
  name: multi-model-rag-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: api
          image: ghcr.io/danishali778/multi-model-rag-api:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: multi-model-rag-config
            - secretRef:
                name: multi-model-rag-secrets
          env:
            - name: RUNTIME_ROLE
              value: api
            - name: TELEMETRY_SERVICE_NAME
              value: multi-model-rag-api
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
